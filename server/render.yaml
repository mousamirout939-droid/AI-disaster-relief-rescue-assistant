# Render.com blueprint for deploying the backend as a Web Service.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: disaster-relief-api
    env: docker
    dockerfilePath: ./dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: disaster_relief_db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: '["https://your-frontend.vercel.app"]'
