<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Report submitted</title></head>
<body style="font-family: Arial, sans-serif; background:#f4f6f8; padding:24px;">
  <div style="max-width:480px;margin:auto;background:#fff;border-radius:8px;padding:32px;">
    <h2 style="color:#2980b9;">Report Received</h2>
    <p>Hi {{name}},</p>
    <p>We've received your disaster report:</p>
    <blockquote style="border-left:4px solid #2980b9;padding-left:12px;color:#333;">
      <strong>Type:</strong> {{disaster_type}}<br>
      <strong>Description:</strong> {{description}}<br>
      <strong>Status:</strong> {{status}}
    </blockquote>
    <p>Our team and nearby rescue units have been notified. You can track updates in the app.</p>
    <hr style="border:none;border-top:1px solid #eee;margin:24px 0;">
    <p style="font-size:12px;color:#888;">This is an automated message from the Disaster Relief platform.</p>
  </div>
</body>
</html>
