<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>🚨 Emergency Alert</title></head>
<body style="font-family: Arial, sans-serif; background:#f4f6f8; padding:24px;">
  <div style="max-width:480px;margin:auto;background:#fff;border-radius:8px;padding:32px;border-top:6px solid #c0392b;">
    <h2 style="color:#c0392b;">🚨 Emergency Alert</h2>
    <p><strong>{{title}}</strong></p>
    <p>{{message}}</p>
    <p style="color:#555;">Severity: <strong>{{severity}}</strong>{{#region}} &middot; Region: {{region}}{{/region}}</p>
    <p>Please follow instructions from local authorities and the in-app emergency guides.</p>
    <hr style="border:none;border-top:1px solid #eee;margin:24px 0;">
    <p style="font-size:12px;color:#888;">This is an automated message from the Disaster Relief platform.</p>
  </div>
</body>
</html>
