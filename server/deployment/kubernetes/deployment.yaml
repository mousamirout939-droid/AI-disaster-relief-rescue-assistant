apiVersion: apps/v1
kind: Deployment
metadata:
  name: disaster-relief-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: disaster-relief-backend
  template:
    metadata:
      labels:
        app: disaster-relief-backend
    spec:
      containers:
        - name: backend
          image: your-registry/disaster-relief-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: disaster-relief-config
            - secretRef:
                name: disaster-relief-secrets
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
