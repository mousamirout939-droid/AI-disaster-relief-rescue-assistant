apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: disaster-relief-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts: ["api.your-domain.com"]
      secretName: disaster-relief-tls
  rules:
    - host: api.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: disaster-relief-backend-svc
                port:
                  number: 80
