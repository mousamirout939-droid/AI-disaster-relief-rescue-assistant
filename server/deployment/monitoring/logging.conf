[loggers]
keys=root,disaster_relief

[handlers]
keys=consoleHandler

[formatters]
keys=defaultFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_disaster_relief]
level=INFO
handlers=consoleHandler
qualname=disaster_relief
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=defaultFormatter
args=(sys.stdout,)

[formatter_defaultFormatter]
format=%(asctime)s | %(levelname)-8s | %(name)s | %(message)s
