# Full-stack local dev: frontend + backend + mongo.
version: "3.9"
services:
  backend:
    build:
      context: ../..
      dockerfile: deployment/docker/dockerfile.backend
    ports: ["8000:8000"]
    env_file: [../../server/.env]
    environment:
      - MONGODB_URI=mongodb://mongo:27017
    depends_on: [mongo]

  frontend:
    build:
      context: ../..
      dockerfile: deployment/docker/dockerfile.frontend
    ports: ["3000:80"]
    depends_on: [backend]

  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]

volumes:
  mongo_data:
